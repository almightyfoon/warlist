name: PR Template

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]
    branches: [main]

jobs:
  check-description:
    name: Check PR description
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Verify template sections are filled out
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: node .github/scripts/check-pr-template.mjs
