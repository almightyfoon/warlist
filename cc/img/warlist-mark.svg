<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Warlist">

  <!-- Dark base plate -->
  <circle cx="50" cy="50" r="50" fill="#0a1520"/>

  <!-- ── Gear teeth: 8 at 45° intervals ──────────────────────────
       Each rect is 12px wide, 12px tall, centered at x=50, top at y=1.5
       (so tip is r=48.5 from center, root is r=36.5)
       rx=2 gives slightly rounded ends so they read as machine teeth        -->
  <g fill="#4d9de8">
    <rect x="44" y="1.5" width="12" height="12" rx="2" transform="rotate(  0 50 50)"/>
    <rect x="44" y="1.5" width="12" height="12" rx="2" transform="rotate( 45 50 50)"/>
    <rect x="44" y="1.5" width="12" height="12" rx="2" transform="rotate( 90 50 50)"/>
    <rect x="44" y="1.5" width="12" height="12" rx="2" transform="rotate(135 50 50)"/>
    <rect x="44" y="1.5" width="12" height="12" rx="2" transform="rotate(180 50 50)"/>
    <rect x="44" y="1.5" width="12" height="12" rx="2" transform="rotate(225 50 50)"/>
    <rect x="44" y="1.5" width="12" height="12" rx="2" transform="rotate(270 50 50)"/>
    <rect x="44" y="1.5" width="12" height="12" rx="2" transform="rotate(315 50 50)"/>
  </g>

  <!-- Inner dark fill — clips the tooth roots and provides the badge face -->
  <circle cx="50" cy="50" r="35" fill="#0a1520"/>

  <!-- Inner accent ring — defines the inner boundary of the gear ring -->
  <circle cx="50" cy="50" r="35" fill="none" stroke="#4d9de8" stroke-width="2"/>

  <!-- Small accent ring inset — adds the double-ring military badge feel -->
  <circle cx="50" cy="50" r="30" fill="none" stroke="#4d9de8" stroke-width="0.75" stroke-dasharray="0"/>

  <!-- ── WL lettermark ─────────────────────────────────────────────
       W drawn as a path so it renders consistently with no font fallback.
       Proportions: bold condensed, angular peaks (machine-stamped feel).
       Baseline at y=62, cap-height at y=40.

       W: 5 points across the top/bottom
          outer-left (16,40), inner-left-valley (23,62), center (30,48),
          inner-right-valley (37,62), outer-right (44,40)
          Bold: each stroke ~5px, achieved by a filled polygon           -->

  <!-- W glyph — filled polygon (shifted +10px on x to center the WL block) -->
  <polygon
    points="26,40  31,40  37.5,59  40,51  42.5,59  49,40  54,40  46,62  42,62  40,55  38,62  34,62"
    fill="#4d9de8"/>

  <!-- L glyph — bold rectangular letterform -->
  <rect x="58" y="40" width="6" height="22" fill="#4d9de8"/>   <!-- stem -->
  <rect x="58" y="56" width="16" height="6"  fill="#4d9de8"/>  <!-- foot -->

  <!-- Subtle horizontal rule below letters — machine-stamp underline -->
  <line x1="24" y1="68" x2="76" y2="68" stroke="#4d9de8" stroke-width="1" stroke-linecap="round" opacity="0.45"/>

</svg>
